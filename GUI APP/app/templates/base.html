<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AutoMapper{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-icon">
          <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        </div>
        <div class="brand">AutoMapper</div>
        <div class="tagline">Active Directory Exploitation Tool</div>
      </header>

      <div class="app-body">
        <aside class="sidebar">
          <div class="nav-section">
            <div class="nav-section-title">Configuration</div>
          </div>
          <a
            href="{{ url_for('main.index') }}"
            class="nav-item {% if request.endpoint == 'main.index' %}active{% endif %}"
          >
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            User Configuration
          </a>
          <a
            href="{{ url_for('main.user_info') }}"
            class="nav-item {% if request.endpoint == 'main.user_info' %}active{% endif %}"
          >
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            User Info
          </a>
          <div class="nav-section">
            <div class="nav-section-title">Actions</div>
          </div>
          <a
            href="{{ url_for('main.exploitation') }}"
            class="nav-item {% if request.endpoint == 'main.exploitation' %}active{% endif %}"
          >
            <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            Kerberoasting
          </a>
          <a
            href="{{ url_for('main.asreproast') }}"
            class="nav-item {% if request.endpoint == 'main.asreproast' %}active{% endif %}"
          >
            <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            AS-REP Roasting
          </a>
        </aside>

        <main class="app-main">
          {% block content %}{% endblock %}
        </main>
      </div>

      <footer class="app-footer">
        <div class="status-bar">
          <div class="status-item">
            <span class="status-dot"></span>
            <span>Ready</span>
          </div>
          <span>|</span>
          <span>© 2026 AutoMapper</span>
        </div>
      </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
